<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataslime | Web</title>
    <style>
        :root {
            /* 深度奶茶與咖啡配色方案 */
            --bg-color: #d7c9b4;     /* 整個大背景：深奶茶色 */
            --header-bg: #4e342e;    /* 標頭：濃縮咖啡色 */
            --header-text: #ffffff;  /* 標頭文字：純白 */
            --container-bg: #fdfaf5; /* 容器底色：燕麥奶油色 */
            --card-bg: #ffffff;     /* 卡片底色：白 */
            --card-border: #bcaaa4; /* 卡片邊框：淺可可色 */
            --text-main: #3e2723;   /* 主文字：深烘焙咖啡色 */
            --text-date: #8d6e63;   /* 日期文字：拿鐵棕 */
            --accent: #e0d5c1;      /* 懸停變色：奶泡色 */
            --hover-border: #8d6e63; /* 懸停邊框：中性棕 */
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 儀表板主容器 */
        .main-container {
            width: 90%;
            max-width: 600px;
            background: var(--container-bg);
            border-radius: 35px; /* 更圓潤的現代感 */
            box-shadow: 0 25px 50px rgba(62, 39, 35, 0.2); /* 深色調陰影 */
            margin: 60px auto;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3); /* 隱約的高光邊框 */
        }

        .header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 45px 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* 卡片網格區域 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 40px;
        }

        /* 卡片樣式 */
        .project-card {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈性動畫 */
            box-sizing: border-box;
        }

        /* 滑鼠懸停效果 */
        .project-card:hover {
            background-color: var(--accent);
            border-color: var(--hover-border);
            transform: translateY(-8px) scale(1.02); /* 向上浮動並稍微放大 */
            box-shadow: 0 10px 20px rgba(93, 64, 55, 0.15);
        }

        .project-title {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .update-label {
            font-size: 0.8rem;
            color: var(--text-date);
            font-weight: 400;
            margin: 2px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .update-date {
            font-size: 0.85rem;
            color: var(--text-date);
            font-weight: 700;
        }

        /* 手機版適應 */
        @media (max-width: 500px) {
            .main-container { margin: 30px auto; }
            .card-grid { padding: 25px; gap: 18px; }
            .header { padding: 35px 20px; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>Welcome to My Web</h1>
    </div>

    <div class="card-grid">
        <a href="###" class="project-card">
            <div class="project-title">Hacking Note</div>
            <div class="update-label">Last Update</div>
            <div class="update-date">13/04/2026</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Side Project</div>
            <div class="update-label">Last Update</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Small Project</div>
            <div class="update-label">Last Update</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="###" class="project-card">
            <div class="project-title">Packet Project</div>
            <div class="update-label">Last Update</div>
            <div class="update-date">dd/mm/yyyy</div>
        </a>

        <a href="resume.html" class="project-card">
            <div class="project-title">Resume</div>
            <div class="update-label">Last Update</div>
            <div class="update-date">2026-04-13</div>
        </a>

    </div>
</div>

</body>
</html>
